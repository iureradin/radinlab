name: Deploy Apps
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Terraform Deploy (Dev)"]
    types: [completed]
jobs:
  deploy:
    runs-on: [self-hosted, dev]
    environment: dev
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      PROXMOX_HOST: "10.0.0.80"
      ZIMAOS_HOST: "10.0.0.140"
    steps:
      - uses: actions/checkout@v4

      - name: Wait for SSH
        run: |
          for i in $(seq 1 6); do
            ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=accept-new root@$ZIMAOS_HOST "hostname" && break
            sleep 10
          done

      - name: Snapshot before deploy
        run: |
          ssh root@$PROXMOX_HOST "qm snapshot 106 pre-deploy-\$(date +%s) --description 'Auto: before app deploy'" || true

      - name: Copy compose to ZimaOS
        run: |
          scp -o StrictHostKeyChecking=accept-new docker/docker-compose.yml root@$ZIMAOS_HOST:/DATA/storage1/docker-compose.yml
          ssh root@$ZIMAOS_HOST "mkdir -p /DATA/storage1/authentik/blueprints"
          scp docker/blueprints/*.yml root@$ZIMAOS_HOST:/DATA/storage1/authentik/blueprints/

      - name: Deploy apps
        run: |
          ssh root@$ZIMAOS_HOST "
            cd /DATA/storage1
            export AUTHENTIK_SECRET_KEY='${{ secrets.AUTHENTIK_SECRET_KEY }}'
            export AUTHENTIK_DB_PASSWORD='${{ secrets.AUTHENTIK_DB_PASSWORD }}'
            export GRAFANA_OIDC_SECRET='${{ secrets.GRAFANA_OIDC_SECRET }}'
            docker compose up -d --remove-orphans
          "

      - name: Wait and health check
        run: |
          sleep 30
          ssh root@$ZIMAOS_HOST "docker ps --format '{{.Names}} {{.Status}}' | grep authentik"
